services:
  - type: web
    name: maid-service-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    rootDir: maid-service-platform-complete/backend
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://your-frontend.vercel.app
